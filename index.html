<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>미니게임 프로토타입</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5d6972;
      --bg: #eef3f2;
      --panel: #ffffff;
      --line: #c8d6d2;
      --accent: #1f6f8b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
    }

    main {
      width: min(620px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 14px 42px rgba(23, 32, 42, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      min-height: 58px;
      padding: 14px 16px;
      border: 1px solid #9fb6b0;
      border-radius: 8px;
      background: #f8fbfb;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
    }

    a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    small {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>미니게임 프로토타입</h1>
    <p>링크 테스트용 공개 프로토타입 목록입니다.</p>
    <a href="./그림자를 배달합니다.html">
      <span>그림자를 배달합니다</span>
      <span>열기</span>
    </a>
    <small>모바일에서는 링크를 누르면 브라우저 또는 앱 내 브라우저에서 실행됩니다.</small>
  </main>
</body>
</html>
