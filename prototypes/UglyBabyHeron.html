<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>참 못생긴 아기 해오라기</title>
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
<style>
  :root {
    --bg1:#102417;
    --bg2:#2b4a2b;
    --panel:rgba(255,255,255,.16);
    --text:#fff7e8;
    --accent:#ffe67a;
    --danger:#ff7171;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; width:100%; height:100%; overflow:hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:#000; color:var(--text);
    touch-action: manipulation;
  }
  #app { position:fixed; inset:0; background:#000; overflow:hidden; }
  .screen { position:absolute; inset:0; display:none; }
  .screen.active { display:block; }

  #introText {
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:22px; background:#000; font-weight:800; font-size:clamp(24px, 7vw, 42px);
    letter-spacing:-.04em; text-align:center;
  }
  .introLine { opacity:0; transform:translateY(12px); animation:lineIn .7s ease forwards; }
  .introLine:nth-child(2) { animation-delay:1.1s; }
  @keyframes lineIn { to { opacity:1; transform:translateY(0); } }

  #photoScreen { background:#000; }
  #photoScreen img {
    width:100%; height:100%; object-fit:cover; object-position:center; filter:saturate(1.05) contrast(1.05);
  }

  #game {
    background:
      radial-gradient(circle at 50% 44%, rgba(255,245,180,.22), transparent 22%),
      linear-gradient(180deg, #244423 0%, #1d331f 42%, #80643c 43%, #a48354 100%);
    user-select:none;
  }
  #hud {
    position:absolute; right:10px; top:calc(env(safe-area-inset-top) + 10px);
    z-index:20; display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
    font-size:13px; font-weight:800; text-shadow:0 2px 3px rgba(0,0,0,.4);
  }
  .hudItem {
    padding:7px 9px; border-radius:999px; background:rgba(0,0,0,.28);
    border:1px solid rgba(255,255,255,.16); backdrop-filter: blur(5px);
  }
  #message {
    position:absolute; left:50%; top:calc(env(safe-area-inset-top) + 58px);
    transform:translateX(-50%); z-index:21;
    padding:8px 13px; border-radius:999px; background:rgba(0,0,0,.34);
    font-weight:900; font-size:15px; opacity:0; transition:.25s;
    white-space:nowrap; pointer-events:none;
  }
  #message.show { opacity:1; transform:translateX(-50%) translateY(6px); }
  #stage {
    position:absolute; inset:0; overflow:hidden;
  }
  #nest {
    position:absolute; left:50%; top:55%; width:190px; height:92px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:
      radial-gradient(ellipse at center, #5a3b1e 0%, #5a3b1e 34%, transparent 36%),
      repeating-linear-gradient(24deg, #8d6234 0 8px, #65431f 8px 13px, #b17a43 13px 18px);
    box-shadow:0 15px 22px rgba(0,0,0,.28), inset 0 0 20px rgba(0,0,0,.45);
    z-index:2;
  }
  #nest:after {
    content:""; position:absolute; inset:18px 28px; border-radius:50%;
    background:rgba(50,30,18,.7); box-shadow:inset 0 6px 12px rgba(0,0,0,.45);
  }

  #chick {
    position:absolute; left:50%; top:48%; width:126px; height:170px;
    transform:translate(-50%,-50%);
    z-index:5; transform-origin:50% 86%;
    transition: transform .2s ease, top .2s ease;
  }
  #chick .body {
    position:absolute; left:22px; top:63px; width:82px; height:92px;
    border-radius:48% 48% 45% 45%;
    background:linear-gradient(160deg,#8a7b7c,#f2ece2 46%,#4d4448);
    box-shadow:inset -14px -10px 16px rgba(0,0,0,.25), 0 10px 20px rgba(0,0,0,.24);
  }
  #chick .head {
    position:absolute; left:13px; top:10px; width:100px; height:84px;
    border-radius:50% 50% 45% 45%;
    background:linear-gradient(160deg,#ded9d9,#5d5860 45%,#eee8e5);
    box-shadow:inset 0 -8px 14px rgba(0,0,0,.2);
  }
  #chick .hair {
    position:absolute; left:50%; top:2px; width:120px; height:64px; transform:translateX(-50%);
    background:
      linear-gradient(76deg, transparent 0 45%, #e9e9e9 47% 49%, transparent 51%),
      linear-gradient(106deg, transparent 0 42%, #f5f5f5 44% 46%, transparent 49%),
      linear-gradient(28deg, transparent 0 48%, #d9d9df 50% 52%, transparent 55%),
      linear-gradient(135deg, transparent 0 43%, #f3f3f3 45% 47%, transparent 50%);
    filter:drop-shadow(0 0 1px #fff);
    animation:frizz 1.6s infinite alternate ease-in-out;
  }
  @keyframes frizz { to { transform:translateX(-50%) rotate(2deg) scale(1.03); } }
  #chick .eye {
    position:absolute; top:44px; width:26px; height:31px; border-radius:50%;
    background:#e1d46b; border:3px solid #343333;
  }
  #chick .eye:after {
    content:""; position:absolute; left:6px; top:5px; width:13px; height:18px; border-radius:50%; background:#050505;
  }
  #chick .eye.left { left:16px; }
  #chick .eye.right { right:16px; }
  #chick .beak {
    position:absolute; left:50%; top:62px; transform:translateX(-50%);
    width:48px; height:33px; border-radius:45% 45% 55% 55%;
    background:linear-gradient(#f5f4ed,#cfc7b7);
    clip-path:polygon(50% 100%, 6% 18%, 94% 18%);
    box-shadow:0 4px 4px rgba(0,0,0,.25);
  }
  #chick .leg {
    position:absolute; top:150px; width:8px; height:27px; background:#b79a67; border-radius:999px;
  }
  #chick .leg.left { left:48px; }
  #chick .leg.right { right:48px; }
  #chick.dance { animation:dance .48s infinite ease-in-out; }
  #chick.bounce { animation:bounce .42s infinite ease-in-out; }
  #chick.sleep { transform:translate(-50%,-43%) rotate(90deg) scale(.92); }
  #chick.stare .eye:after { width:16px; height:21px; left:4px; top:4px; }
  @keyframes dance {
    0%,100% { transform:translate(-50%,-50%) rotate(-8deg); }
    50% { transform:translate(-50%,-54%) rotate(8deg); }
  }
  @keyframes bounce {
    0%,100% { transform:translate(-50%,-50%) scaleY(.96); }
    50% { transform:translate(-50%,-62%) scaleY(1.04); }
  }

  .food {
    position:absolute; z-index:4; font-size:30px; filter:drop-shadow(0 3px 2px rgba(0,0,0,.3));
    animation:foodPop .35s ease both;
  }
  @keyframes foodPop { from { transform:scale(.2); opacity:0; } to { transform:scale(1); opacity:1; } }

  .predator {
    position:absolute; z-index:11; width:58px; height:58px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.28); border:2px solid rgba(255,255,255,.4);
    font-size:34px; box-shadow:0 8px 16px rgba(0,0,0,.28);
    animation:predPulse .7s infinite alternate ease-in-out;
  }
  @keyframes predPulse { to { transform:scale(1.12); filter:brightness(1.2); } }

  #egg {
    position:absolute; left:50%; top:47%; transform:translate(-50%,-50%);
    width:82px; height:108px; border-radius:50% 50% 46% 46%;
    background:radial-gradient(circle at 33% 22%, #fff, #f6f0cb 45%, #d6c58d 100%);
    box-shadow:0 8px 20px rgba(0,0,0,.3), inset -8px -10px 14px rgba(0,0,0,.15);
    z-index:8; display:none;
  }
  #egg.crack {
    animation:eggShake .22s infinite;
  }
  #egg:after {
    content:""; position:absolute; left:18px; top:43px; width:48px; height:32px;
    background:linear-gradient(135deg, transparent 0 45%, rgba(110,90,40,.55) 46% 51%, transparent 52%);
  }
  @keyframes eggShake {
    0%,100% { transform:translate(-50%,-50%) rotate(-4deg); }
    50% { transform:translate(-50%,-50%) rotate(4deg); }
  }

  #itemBar {
    position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 18px);
    transform:translateX(-50%); z-index:25; display:none; gap:10px; align-items:center;
    background:rgba(0,0,0,.26); border:1px solid rgba(255,255,255,.22);
    border-radius:22px; padding:10px 12px; backdrop-filter:blur(6px);
  }
  .slot {
    width:58px; height:58px; border-radius:18px; background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22); display:flex; align-items:center; justify-content:center;
    font-size:34px; position:relative;
  }
  .count {
    position:absolute; right:-4px; bottom:-4px; min-width:22px; height:22px;
    border-radius:999px; background:#2e2112; color:#fff; font-size:12px;
    display:flex; align-items:center; justify-content:center; font-weight:900;
    border:1px solid rgba(255,255,255,.4);
  }
  #toast {
    position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 92px);
    transform:translateX(-50%); z-index:30; opacity:0; pointer-events:none;
    background:rgba(0,0,0,.55); color:#fff; padding:9px 14px; border-radius:999px;
    font-size:15px; font-weight:900; transition:.25s; white-space:nowrap;
  }
  #toast.show { opacity:1; bottom:calc(env(safe-area-inset-bottom) + 102px); }

  #endingOverlay {
    position:absolute; inset:0; z-index:50; display:none; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,.45); text-align:center; font-weight:900; font-size:24px;
  }
  #adultBird {
    font-size:76px; position:absolute; left:50%; top:56%; transform:translate(-50%,-50%);
    animation:flyAway 2.2s ease-in forwards;
  }
  @keyframes flyAway {
    0% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    100% { transform:translate(-50%,-260%) scale(.35); opacity:0; }
  }
</style>
</head>

  </section>

  <section id="game" class="screen">
    <div id="hud">
      <div class="hudItem" id="timeText">00:00</div>
      <div class="hudItem" id="levelText">해오라기 LV.1</div>
      <div class="hudItem" id="likeText">호감도 0</div>
      <div class="hudItem" id="genText">1세대</div>
    </div>
    <div id="message"></div>
    <div id="stage">
      <div id="nest"></div>
      <div id="egg"></div>
      <div id="chick">
        <div class="hair"></div>
        <div class="body"></div>
        <div class="head">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="beak"></div>
        </div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
    <div id="itemBar">
      <div class="slot" id="wormSlot">🐛<span class="count" id="wormCount">0</span></div>
    </div>
    <div id="toast"></div>
    <div id="endingOverlay">
      <div id="adultBird">🪽</div>
      <div style="margin-top:160px">이제 혼자 날 수 있게 되었어요</div>
    </div>
  </section>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const screens = ["introText","photoScreen","game"];
  const chick = $("chick");
  const egg = $("egg");
  const itemBar = $("itemBar");
  const wormCount = $("wormCount");
  const toast = $("toast");
  const message = $("message");
  const endingOverlay = $("endingOverlay");

  const state = {
    seconds: 0,
    level: 1,
    like: 0,
    totalLike: 0,
    generation: 1,
    worms: 0,
    playing: false,
    graduating: false,
    behaviorTimer: null,
    predatorTimer: null,
    foodTimer: null,
    itemTimer: null,
    secondTimer: null
  };

  const predatorSet = ["🦅","🐍","🐈‍⬛","🦎","🕷️"];
  const foods = ["🐛","🌼"];

  function show(id) {
    screens.forEach(s => $(s).classList.remove("active"));
    $(id).classList.add("active");
  }

  function pad(n) { return String(n).padStart(2,"0"); }
  function fmtTime(sec) {
    return `${pad(Math.floor(sec/60))}:${pad(sec%60)}`;
  }
  function updateHud() {
    $("timeText").textContent = fmtTime(state.seconds);
    $("levelText").textContent = `해오라기 LV.${state.level}`;
    $("likeText").textContent = `호감도 ${state.like}`;
    $("genText").textContent = `${state.generation}세대`;
    wormCount.textContent = state.worms;
  }
  function say(text, ms=1300) {
    message.textContent = text;
    message.classList.add("show");
    clearTimeout(message._t);
    message._t = setTimeout(() => message.classList.remove("show"), ms);
  }
  function pop(text, ms=1200) {
    toast.textContent = text;
    toast.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove("show"), ms);
  }

  function startGame() {
    show("game");
    state.playing = true;
    updateHud();
    say("둥지에 이상한 아기새가 있습니다");
    state.secondTimer = setInterval(() => {
      if (!state.playing || state.graduating) return;
      state.seconds++;
      const nextLv = Math.min(10, Math.floor(state.seconds / 30) + 1);
      if (nextLv !== state.level) {
        state.level = nextLv;
        say(`LV.${state.level}이 되었습니다`);
        if (state.level >= 10) graduate();
      }
      updateHud();
    }, 1000);

    state.behaviorTimer = setInterval(randomBehavior, 2300);
    state.predatorTimer = setInterval(spawnPredator, 3600);
    state.foodTimer = setInterval(spawnFood, 5200);

    if (state.generation >= 2) enableItems();
  }

  function enableItems() {
    itemBar.style.display = "flex";
    if (!state.itemTimer) {
      state.itemTimer = setInterval(() => {
        if (!state.playing || state.graduating) return;
        state.worms = Math.min(9, state.worms + 1);
        updateHud();
        pop("애벌레가 생겼습니다");
      }, 8000);
    }
  }

  function randomBehavior() {
    if (!state.playing || state.graduating) return;
    chick.className = "";
    const behaviors = ["dance","bounce","sleep","stare","idle"];
    const pick = behaviors[Math.floor(Math.random()*behaviors.length)];
    if (pick !== "idle") chick.classList.add(pick);
    if (pick === "dance") say("못생긴 춤을 춥니다", 900);
    if (pick === "sleep") say("갑자기 잡니다", 900);
    if (pick === "stare") say("정면을 바라봅니다", 900);
    setTimeout(() => { if (!state.graduating) chick.className = ""; }, 1500);
  }

  function spawnFood() {
    if (!state.playing || state.graduating) return;
    const el = document.createElement("div");
    el.className = "food";
    el.textContent = foods[Math.floor(Math.random()*foods.length)];
    el.style.left = (38 + Math.random()*24) + "%";
    el.style.top = (61 + Math.random()*16) + "%";
    $("stage").appendChild(el);
    setTimeout(() => {
      if (el.isConnected) {
        el.remove();
        chick.classList.add("bounce");
        say(el.textContent === "🐛" ? "애벌레를 주워 먹었습니다" : "꽃도 먹습니다");
        setTimeout(()=>chick.classList.remove("bounce"), 900);
      }
    }, 1700);
  }

  function spawnPredator() {
    if (!state.playing || state.graduating) return;
    const p = document.createElement("button");
    p.className = "predator";
    p.textContent = predatorSet[Math.floor(Math.random()*predatorSet.length)];
    const side = Math.floor(Math.random()*4);
    if (side === 0) { p.style.left = Math.random()*85 + "%"; p.style.top = "13%"; }
    if (side === 1) { p.style.left = Math.random()*85 + "%"; p.style.top = "80%"; }
    if (side === 2) { p.style.left = "4%"; p.style.top = (22+Math.random()*58) + "%"; }
    if (side === 3) { p.style.left = "82%"; p.style.top = (22+Math.random()*58) + "%"; }

    const timeout = setTimeout(() => {
      if (p.isConnected) {
        p.remove();
        state.like = Math.max(0, state.like - 1);
        updateHud();
        say("아기 해오라기가 겁먹었습니다");
      }
    }, 3500);

    p.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      clearTimeout(timeout);
      p.remove();
      state.like++;
      state.totalLike++;
      updateHud();
      pop("천적을 쫓아냈습니다  호감도 +1");
      chick.classList.add("dance");
      setTimeout(()=>chick.classList.remove("dance"), 800);
    });
    $("stage").appendChild(p);
  }

  $("wormSlot").addEventListener("pointerdown", () => {
    if (state.worms <= 0 || state.graduating) return;
    state.worms--;
    state.like += 2;
    state.totalLike += 2;
    updateHud();
    chick.classList.add("bounce");
    say("해오라기가 기뻐합니다");
    pop("애벌레를 먹였습니다  호감도 +2");
    setTimeout(()=>chick.classList.remove("bounce"), 900);
  });

  function graduate() {
    if (state.graduating) return;
    state.graduating = true;
    state.playing = false;
    chick.style.display = "none";
    endingOverlay.style.display = "flex";
    document.querySelectorAll(".predator,.food").forEach(e=>e.remove());
    setTimeout(() => {
      endingOverlay.style.display = "none";
      egg.style.display = "block";
      egg.classList.remove("crack");
      say("둥지에 알이 하나 남았습니다", 1800);
    }, 2500);
    setTimeout(() => {
      egg.classList.add("crack");
      say("알이 흔들립니다", 1500);
    }, 4700);
    setTimeout(() => {
      egg.style.display = "none";
      egg.classList.remove("crack");
      chick.style.display = "block";
      state.generation++;
      state.seconds = 0;
      state.level = 1;
      state.like = 0;
      state.graduating = false;
      state.playing = true;
      enableItems();
      updateHud();
      say(`${state.generation}세대 아기 해오라기가 태어났습니다`, 1800);
    }, 6800);
  }

  setTimeout(() => show("photoScreen"), 2700);
  setTimeout(() => startGame(), 5000);
})();
</script>
</body>
</html>
