<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>고양이를 담아봐요</title>
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <style>
    :root {
      --bg1: #fff7e8;
      --bg2: #f2ecff;
      --ink: #2b2533;
      --muted: #7d7288;
      --primary: #ff8f70;
      --primary-dark: #e66e50;
      --glass: rgba(169, 221, 255, 0.34);
      --glass-border: rgba(89, 158, 210, 0.48);
      --panel: rgba(255, 255, 255, 0.76);
      --shadow: 0 14px 38px rgba(52, 38, 74, 0.16);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; color: var(--ink); }
    body {
      background: radial-gradient(circle at top left, #fff1c9 0, transparent 34%), linear-gradient(145deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    .game {
      width: min(100vw, 480px);
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      padding: 18px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .pill {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 8px 24px rgba(52, 38, 74, .1);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 14px;
    }

    .liter-guide {
      width: 76px;
      height: 92px;
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 7px;
      font-size: 11px;
      font-weight: 800;
    }

    .beaker {
      width: 38px;
      height: 54px;
      border: 3px solid #7db7d8;
      border-top: none;
      border-radius: 0 0 12px 12px;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,.55);
    }
    .beaker::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 62%;
      background: linear-gradient(#aee6ff, #72cdf2);
      border-top: 2px solid rgba(255,255,255,.7);
    }
    .beaker-mark {
      margin-top: 3px;
      text-align: center;
    }

    .stage {
      flex: 1;
      position: relative;
      border-radius: 28px;
      background: rgba(255,255,255,.38);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.62);
      overflow: hidden;
      min-height: 340px;
    }

    .message {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 180px;
      max-width: 88%;
      text-align: center;
      background: rgba(255,255,255,.86);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 900;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      z-index: 4;
    }
    .message.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .cat-zone {
      position: absolute;
      top: 66px;
      left: 0;
      right: 0;
      height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
    }

    .cat-label {
      background: rgba(255,255,255,.86);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 14px;
      font-weight: 850;
      box-shadow: 0 8px 18px rgba(52,38,74,.09);
      min-height: 33px;
    }

    .cat {
      width: var(--cat-size, 110px);
      height: calc(var(--cat-size, 110px) * .78);
      position: relative;
      transition: transform .45s cubic-bezier(.2,1.3,.3,1), opacity .35s;
      animation: idle 1.7s ease-in-out infinite;
    }

    @keyframes idle { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-5px) rotate(1deg); } }

    .cat-body {
      position: absolute;
      left: 12%; right: 7%; bottom: 0;
      height: 72%;
      background: var(--cat-color, #f4a75e);
      border-radius: 48% 52% 44% 44%;
      box-shadow: inset -10px -7px 0 rgba(0,0,0,.06), 0 10px 22px rgba(52,38,74,.12);
    }
    .cat-head {
      position: absolute;
      left: 20%; top: 4%;
      width: 48%; height: 58%;
      background: var(--cat-color, #f4a75e);
      border-radius: 50%;
      box-shadow: inset -6px -4px 0 rgba(0,0,0,.05);
    }
    .cat-head::before, .cat-head::after {
      content: "";
      position: absolute; top: -13%;
      width: 28%; height: 30%;
      background: var(--cat-color, #f4a75e);
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
    }
    .cat-head::before { left: 8%; transform: rotate(-18deg); }
    .cat-head::after { right: 8%; transform: rotate(18deg); }
    .cat-eye {
      position: absolute; top: 47%; width: 7px; height: 10px;
      background: #2b2533; border-radius: 50%;
    }
    .cat-eye.left { left: 34%; }
    .cat-eye.right { right: 34%; }
    .cat-mouth {
      position: absolute; left: 50%; top: 63%; transform: translateX(-50%);
      font-size: 14px; line-height: 1;
    }
    .cat-tail {
      position: absolute;
      right: 0; bottom: 22%;
      width: 27%; height: 54%;
      border: calc(var(--cat-size, 110px) * .07) solid var(--cat-color, #f4a75e);
      border-left: none;
      border-bottom: none;
      border-radius: 0 80% 0 0;
      transform: rotate(22deg);
    }
    .cat.happy .cat-mouth::before { content: "ω"; }
    .cat.angry .cat-mouth::before { content: "Д"; }
    .cat.neutral .cat-mouth::before { content: "ᴗ"; }
    .cat.escaping { animation: none; transform: translate(220px, -80px) rotate(26deg) scale(.8) !important; opacity: 0; }
    .cat.entering { animation: none; transform: translateY(174px) scale(.42) !important; opacity: .95; }

    .bottle-row {
      position: absolute;
      left: 10px; right: 10px; bottom: 16px;
      display: flex;
      align-items: end;
      justify-content: space-around;
      gap: 8px;
    }

    .bottle-btn {
      border: 0;
      background: transparent;
      width: 31%;
      min-height: 138px;
      display: grid;
      place-items: end center;
      padding: 0;
      cursor: pointer;
      position: relative;
      transition: transform .14s;
    }
    .bottle-btn:active { transform: translateY(3px) scale(.98); }
    .bottle-btn.disabled { pointer-events: none; }

    .bottle {
      width: var(--bottle-w, 72px);
      height: var(--bottle-h, 118px);
      border: 4px solid var(--glass-border);
      background: linear-gradient(110deg, rgba(255,255,255,.72), var(--glass) 45%, rgba(255,255,255,.25));
      border-radius: var(--bottle-radius, 18px 18px 24px 24px);
      position: relative;
      box-shadow: inset 8px 0 8px rgba(255,255,255,.42), 0 12px 22px rgba(52,38,74,.14);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: visible;
    }
    .bottle::before {
      content: "";
      position: absolute;
      top: -34px;
      left: 50%;
      width: calc(var(--bottle-w, 72px) * .42);
      height: 38px;
      transform: translateX(-50%);
      border: 4px solid var(--glass-border);
      border-bottom: none;
      border-radius: 12px 12px 4px 4px;
      background: rgba(255,255,255,.58);
    }
    .bottle::after {
      content: "";
      position: absolute;
      top: 12px; left: 12px;
      width: 10px; height: 58%;
      background: rgba(255,255,255,.55);
      border-radius: 999px;
    }
    .bottle-liter {
      position: absolute;
      bottom: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      color: #30617d;
      font-weight: 900;
      font-size: 13px;
    }
    .bottle.selected { outline: 5px solid rgba(255,143,112,.35); }
    .inside-cat {
      position: absolute;
      bottom: 12px;
      font-size: 32px;
      opacity: 0;
      transform: scale(.5);
      transition: opacity .2s, transform .25s;
      z-index: 2;
    }
    .bottle.filled .inside-cat { opacity: 1; transform: scale(1); }

    .modal {
      position: absolute; inset: 0;
      background: rgba(43,37,51,.36);
      display: grid;
      place-items: center;
      z-index: 20;
      padding: 20px;
    }
    .modal-card {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,.96);
      border-radius: 28px;
      padding: 24px 20px 20px;
      box-shadow: 0 24px 60px rgba(43,37,51,.28);
      text-align: center;
    }
    .modal-card h1, .modal-card h2 { margin: 0 0 10px; font-size: 25px; }
    .modal-card p { margin: 0 0 18px; color: var(--muted); font-weight: 650; line-height: 1.5; }
    .primary-btn {
      border: 0;
      width: 100%;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 950;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(230,110,80,.28);
    }
    .ghost-btn {
      margin-top: 10px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      padding: 10px;
      cursor: pointer;
    }
    .hidden { display: none; }

    .pop {
      animation: pop .36s cubic-bezier(.2,1.45,.3,1) both;
    }
    @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <main class="game">
    <div class="topbar">
      <div class="pill" id="roundText">1 / 10</div>
      <div class="pill" id="scoreText">성공 0</div>
      <div class="liter-guide" aria-label="1리터 기준">
        <div class="beaker"></div>
        <div class="beaker-mark">1L 기준</div>
      </div>
    </div>

    <section class="stage">
      <div class="message" id="message">완벽 수납!</div>
      <div class="cat-zone">
        <div class="cat neutral" id="cat" style="--cat-size:110px; --cat-color:#f4a75e;">
          <div class="cat-tail"></div>
          <div class="cat-body"></div>
          <div class="cat-head">
            <div class="cat-eye left"></div>
            <div class="cat-eye right"></div>
            <div class="cat-mouth"></div>
          </div>
        </div>
        <div class="cat-label" id="catLabel">이 고양이는 2리터입니다</div>
      </div>
      <div class="bottle-row" id="bottleRow"></div>
    </section>
  </main>

  <div class="modal" id="startModal">
    <div class="modal-card pop">
      <h1>고양이를 담아봐요</h1>
      <p>고양이에게 딱 맞는 물병을 골라주세요.<br>너무 작으면 삐지고, 너무 크면 허전해합니다.</p>
      <button class="primary-btn" id="startBtn">시작하기</button>
    </div>
  </div>

  <div class="modal hidden" id="resultModal">
    <div class="modal-card pop">
      <h2 id="resultTitle">결과</h2>
      <p id="resultBody"></p>
      <button class="primary-btn" id="restartBtn">다시 담기</button>
      <button class="ghost-btn" id="closeResultBtn">닫기</button>
    </div>
  </div>

  <script>
    const TOTAL_ROUNDS = 10;
    const volumes = [1, 2, 3];
    const colors = ['#f4a75e', '#8f8a82', '#ffffff', '#d76e5c', '#8cc1a8', '#c7a6e8'];
    const catNames = {
      1: ['작은 치즈냥', '한 컵 고등어냥'],
      2: ['동그란 치즈냥', '식빵 삼색냥'],
      3: ['거대한 장모냥', '묵직한 회색냥']
    };
    const bottleShapes = {
      1: [
        { w: 56, h: 92, r: '22px 22px 20px 20px' },
        { w: 68, h: 82, r: '34px 34px 18px 18px' },
        { w: 48, h: 104, r: '16px 16px 20px 20px' }
      ],
      2: [
        { w: 72, h: 112, r: '22px 22px 26px 26px' },
        { w: 88, h: 98, r: '42px 42px 24px 24px' },
        { w: 62, h: 126, r: '18px 18px 24px 24px' }
      ],
      3: [
        { w: 88, h: 130, r: '24px 24px 32px 32px' },
        { w: 104, h: 112, r: '52px 52px 28px 28px' },
        { w: 76, h: 148, r: '20px 20px 30px 30px' }
      ]
    };

    let round = 1;
    let score = 0;
    let currentCat = null;
    let locked = false;

    const roundText = document.getElementById('roundText');
    const scoreText = document.getElementById('scoreText');
    const cat = document.getElementById('cat');
    const catLabel = document.getElementById('catLabel');
    const bottleRow = document.getElementById('bottleRow');
    const message = document.getElementById('message');
    const startModal = document.getElementById('startModal');
    const resultModal = document.getElementById('resultModal');
    const resultTitle = document.getElementById('resultTitle');
    const resultBody = document.getElementById('resultBody');

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function makeCat() {
      const volume = pick(volumes);
      return {
        volume,
        name: pick(catNames[volume]),
        color: pick(colors),
        size: volume === 1 ? 88 + Math.random() * 10 : volume === 2 ? 114 + Math.random() * 12 : 142 + Math.random() * 14
      };
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add('show');
      setTimeout(() => message.classList.remove('show'), 1050);
    }

    function updateTopbar() {
      roundText.textContent = `${Math.min(round, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
      scoreText.textContent = `성공 ${score}`;
    }

    function startRound() {
      locked = false;
      updateTopbar();
      currentCat = makeCat();

      cat.className = 'cat neutral';
      cat.style.opacity = '1';
      cat.style.setProperty('--cat-size', `${currentCat.size}px`);
      cat.style.setProperty('--cat-color', currentCat.color);

      if (round <= 7) {
        catLabel.textContent = `이 고양이는 ${currentCat.volume}리터입니다`;
      } else {
        catLabel.textContent = '오늘의 고양이는 몇 리터일까요?';
      }

      renderBottles();
    }

    function renderBottles() {
      bottleRow.innerHTML = '';
      const wrongs = shuffle(volumes.filter(v => v !== currentCat.volume)).slice(0, 2);
      const options = shuffle([currentCat.volume, ...wrongs]);

      options.forEach((volume) => {
        const shape = pick(bottleShapes[volume]);
        const btn = document.createElement('button');
        btn.className = 'bottle-btn';
        btn.setAttribute('aria-label', `${volume}리터 병`);
        btn.innerHTML = `
          <div class="bottle" style="--bottle-w:${shape.w}px; --bottle-h:${shape.h}px; --bottle-radius:${shape.r};">
            <div class="inside-cat">🐱</div>
            ${round <= 3 ? `<div class="bottle-liter">${volume}L</div>` : ''}
          </div>
        `;
        btn.addEventListener('click', () => chooseBottle(btn, volume));
        bottleRow.appendChild(btn);
      });
    }

    function chooseBottle(btn, volume) {
      if (locked) return;
      locked = true;
      document.querySelectorAll('.bottle-btn').forEach(b => b.classList.add('disabled'));
      const bottle = btn.querySelector('.bottle');
      bottle.classList.add('selected');

      if (volume === currentCat.volume) {
        score++;
        cat.className = 'cat happy entering';
        bottle.classList.add('filled');
        showMessage('완벽 수납!');
      } else {
        cat.className = 'cat angry escaping';
        if (volume < currentCat.volume) showMessage('좁습니다');
        else showMessage('허전합니다');
      }

      setTimeout(nextRound, 1150);
    }

    function nextRound() {
      if (round >= TOTAL_ROUNDS) {
        showResult();
      } else {
        round++;
        startRound();
      }
    }

    function grade(score) {
      if (score === 10) return '완벽한 고양이 수납가';
      if (score >= 7) return '훌륭한 병 관리자';
      if (score >= 4) return '아직 병이 낯섭니다';
      return '고양이에게 거절당했습니다';
    }

    function showResult() {
      updateTopbar();
      resultTitle.textContent = grade(score);
      resultBody.innerHTML = `오늘 당신은 고양이 <strong>${score}마리</strong>를 담았습니다.<br>다시 도전해서 완벽 수납을 노려보세요.`;
      resultModal.classList.remove('hidden');
    }

    function resetGame() {
      round = 1;
      score = 0;
      resultModal.classList.add('hidden');
      startRound();
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      startModal.classList.add('hidden');
      startRound();
    });
    document.getElementById('restartBtn').addEventListener('click', resetGame);
    document.getElementById('closeResultBtn').addEventListener('click', () => resultModal.classList.add('hidden'));
  </script>
</body>
</html>
